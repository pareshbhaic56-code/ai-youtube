<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI YouTube Studio Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<div class="dashboard">

<h1>🤖 AI YouTube Studio</h1>

<p>Welcome to your AI Dashboard</p>

<div class="cards">

<div class="card">
<h2>📝 Script AI</h2>
<p>Create AI Scripts</p>
<button onclick="scriptAI()">Open</button>
</div>

<div class="card">
<h2>🎥 Video AI</h2>
<p>Create AI Videos</p>
<button onclick="videoAI()">Open</button>
</div>

<div class="card">
<h2>🖼 Thumbnail AI</h2>
<p>Create AI Thumbnails</p>
<button onclick="thumbnailAI()">Open</button>
</div>

<div class="card">
<h2>📤 Upload AI</h2>
<p>Upload Video</p>
<button onclick="uploadAI()">Open</button>
</div>

</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
